<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Full 64-Bit Solar System Simulation - Y2K38</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Stars Background -->
    <div class="stars-parallax">
        <div id="stars-back"></div>
        <div id="stars-mid"></div>
    </div>

    <!-- UI Panel -->
    <div class="ui-panel">
        <h1>Solar System (64-Bit)</h1>
        <div class="data">TIMESTAMP: <span id="timestamp">0</span></div>
        <div class="data">DATE: <span id="date-display">Loading...</span></div>
        <div class="controls">
            <button onclick="jumpTo2038()">Jump to 2038</button>
            <button id="glitch-btn" onclick="toggleGlitch()">Enable 32-bit Crash</button>
            <button id="reset-view-btn">Reset View</button>
            <!-- Audio Controls -->
            <div class="audio-controls">
                <button id="toggle-music-btn">Play Music</button>
                <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.3">
            </div>
        </div>
        <p id="status-msg">Status: 64-bit Stable</p>
    </div>

    <!-- Solar System Container (CENTERED) -->
    <div class="solar-system" style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);">
        <div class="sun"></div>

        <!-- Mercury -->
        <div class="orbit mercury-orbit">
            <div class="planet mercury" data-name="Mercury">
                <!-- No moons -->
            </div>
        </div>

        <!-- Venus -->
        <div class="orbit venus-orbit">
            <div class="planet venus" data-name="Venus">
                <!-- No moons -->
            </div>
        </div>

        <!-- Earth -->
        <div class="orbit earth-orbit">
            <div class="planet earth" data-name="Earth">
                <div class="moon"></div>
            </div>
        </div>

        <!-- Mars -->
        <div class="orbit mars-orbit">
            <div class="planet mars" data-name="Mars">
                <div class="moon"></div>
                <div class="moon"></div>
            </div>
        </div>

        <!-- Jupiter -->
        <div class="orbit jupiter-orbit">
            <div class="planet jupiter" data-name="Jupiter">
                <div class="moon"></div>
                <div class="moon"></div>
                <div class="moon"></div>
                <div class="moon"></div>
            </div>
        </div>

        <!-- Saturn -->
        <div class="orbit saturn-orbit">
            <div class="planet saturn" data-name="Saturn">
                <div class="rings"></div>
                <div class="moon"></div>
                <div class="moon"></div>
                <div class="moon"></div>
            </div>
        </div>

        <!-- Uranus -->
        <div class="orbit uranus-orbit">
            <div class="planet uranus" data-name="Uranus">
                <div class="moon"></div>
                <div class="moon"></div>
            </div>
        </div>

        <!-- Neptune -->
        <div class="orbit neptune-orbit">
            <div class="planet neptune" data-name="Neptune">
                <div class="moon"></div>
            </div>
        </div>

        <!-- Pluto -->
        <div class="orbit pluto-orbit">
            <div class="planet pluto" data-name="Pluto">
                <div class="moon"></div>
                <div class="moon"></div>
                <div class="moon"></div>
                <div class="moon"></div>
                <div class="moon"></div>
            </div>
        </div>
    </div>

    <!-- Planet Information Panel -->
    <div id="planet-info-panel">
        <h2 id="info-planet-name"></h2>
        <div id="info-planet-data"></div>
        <button id="close-info-panel">Close</button>
    </div>

    <!-- Scripts -->
    <script src="script1.js"></script>
    <script src="script2.js"></script>
    <script src="script3.js"></script>
    <script src="script4.js"></script>
    <script src="script5.js"></script>
    <script src="ultra_secure_mode.js"></script>
</body>
</html>
